<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#eef2f7;color:#1a2332;font-family:'Plus Jakarta Sans',sans-serif;overflow-x:hidden}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideIn{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes bounce{0%,80%,100%{transform:scale(.7);opacity:.5}40%{transform:scale(1.1);opacity:1}}
@keyframes toast{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#c8d8e8;border-radius:4px}

  {id:'t5',uid:'u6',unit:'S2',prop:'Mombasa Road Plaza',name:'Naivas Supermarket',phone:'0800 720 720',email:'naivas@naivas.co.ke',idno:'N/A',rent:75000,deposit:150000,due:1,ls:'2022-06-01',le:'2026-06-01',pstatus:'partial'},

  {id:'py6',tid:'t8',tname:'Fatuma Ali',amt:60000,date:'2025-01-05',method:'M-Pesa',ref:'GHI0OP3456',status:'paid'},

// ---- HELPERS ----
function kes(n) { return 'KES ' + (n||0).toLocaleString(); }
function fmtDate(d) {
  if (!d) return '--';
  return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}
function initials(name) {
  if (!name) return '??';
  var parts = name.split(' ');
  return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
}

// ---- UI ATOMS ----
function Card(props) {
  return e('div', {
    onClick: props.onClick,
    style: Object.assign({background:CARD,border:'1px solid '+BRD,borderRadius:14,boxShadow:'0 1px 4px rgba(0,0,0,0.05)'}, props.style||{})
  }, props.children);
}

function Btn(props) {
  var variants = {
    primary: {background:'linear-gradient(135deg,'+P+','+PD+')',color:'#fff',boxShadow:'0 4px 12px rgba(13,122,95,0.25)'},
    ghost:   {background:'transparent',color:MUT,border:'1.5px solid '+BRD},
    teal:    {background:PL,color:P,border:'1px solid rgba(13,122,95,0.25)'},
    amber:   {background:ACCL,color:ACC,border:'1px solid rgba(240,165,0,0.25)'},
    danger:  {background:DNGL,color:DNG,border:'1px solid rgba(220,53,69,0.25)'}
  };
  var v = variants[props.v||'primary'];
  return e('button', {
    onClick: props.onClick,
    disabled: props.disabled,
    style: Object.assign({padding:'11px 18px',borderRadius:10,fontSize:13,fontWeight:600,cursor:'pointer',border:'none',fontFamily:'inherit',width:props.full?'100%':'auto'}, v, props.style||{})
  }, props.children);
}

function Inp(props) {
  return e('input', {
    type: props.type||'text',
    value: props.value,
    onChange: props.onChange,
    placeholder: props.placeholder,
    style: Object.assign({width:'100%',background:BG,border:'1.5px solid '+BRD,borderRadius:10,color:TXT,padding:'11px 14px',fontSize:14,outline:'none',fontFamily:'inherit'}, props.style||{})
  });
}

function Sel(props) {
  return e('select', {
    value: props.value,
    onChange: props.onChange,
    style: {width:'100%',background:BG,border:'1.5px solid '+BRD,borderRadius:10,color:TXT,padding:'11px 14px',fontSize:14,outline:'none',fontFamily:'inherit',cursor:'pointer'}
  }, props.children);
}

function FG(props) {
  return e('div', {style:Object.assign({marginBottom:14},props.style||{})},
    e('div', {style:{fontSize:11,color:MUT,marginBottom:5,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.07em'}}, props.label),
    props.children
  );
}

function Ava(props) {
  var sz = props.size||38;
  return e('div', {style:{width:sz,height:sz,borderRadius:'50%',background:'linear-gradient(135deg,'+P+','+PD+')',display:'flex',alignItems:'center',justifyContent:'center',fontSize:sz*0.32,fontWeight:700,color:'#fff',flexShrink:0}}, initials(props.name));
}

function Badge(props) {
  var s = props.status;
  var map = {
    paid:    {bg:PL,   color:P,   label:'Paid'},
    overdue: {bg:DNGL, color:DNG, label:'Overdue'},
    partial: {bg:WRNL, color:WRN, label:'Partial'},
    pending: {bg:ACCL, color:ACC, label:'Pending'},
    vacant:  {bg:'#f5f5f5',color:MUT,label:'Vacant'},
    occupied:{bg:PL,   color:P,   label:'Occupied'}
  };
  var cfg = map[s]||map.pending;
  return e('span', {style:{display:'inline-flex',alignItems:'center',gap:4,padding:'3px 10px',borderRadius:20,fontSize:10,fontWeight:700,background:cfg.bg,color:cfg.color,whiteSpace:'nowrap',textTransform:'uppercase',letterSpacing:'0.04em'}},
    e('span', {style:{width:5,height:5,borderRadius:'50%',background:cfg.color,flexShrink:0}}),
    cfg.label
  );
}

function Hdr(props) {
  return e('div', {style:{padding:'15px 20px',borderBottom:'1px solid '+BRD,background:'#fff',display:'flex',alignItems:'center',flexShrink:0,gap:10}},
    props.back && e('span', {onClick:props.onBack,style:{cursor:'pointer',color:MUT,fontSize:22,lineHeight:1,marginRight:4}}, '<'),
    e('div', {style:{flex:1}},
      e('div', {style:{fontFamily:"'Playfair Display',serif",fontSize:21,fontWeight:700,color:TXT}}, props.title),
      props.sub && e('div', {style:{fontSize:12,color:MUT,marginTop:1}}, props.sub)
    ),
    props.action && e(Btn, {onClick:props.onAction,style:{padding:'9px 16px',fontSize:12}}, props.action)
  );
}

function SecTitle(props) {
  return e('div', {style:{fontSize:11,textTransform:'uppercase',letterSpacing:'0.12em',color:MUT,marginBottom:12,fontWeight:700}}, props.children);
}

function Toast(props) {
  useEffect(function() {
    var t = setTimeout(props.onHide, 3000);
    return function() { clearTimeout(t); };
  }, []);
  return e('div', {style:{position:'fixed',bottom:90,left:'50%',transform:'translateX(-50%)',background:TXT,borderRadius:24,padding:'11px 22px',fontSize:13,color:'#fff',zIndex:999,animation:'toast 0.25s ease',whiteSpace:'nowrap',boxShadow:'0 8px 24px rgba(0,0,0,0.18)',fontWeight:500}}, props.msg);
}

// ---- DASHBOARD ----
function Dashboard(props) {
  var payments = props.payments;
  var tenants = props.tenants;
  var units = props.units;
  var properties = props.properties;
  var setTab = props.setTab;

  var collected = 0;
  for (var i=0; i<payments.length; i++) {
    var p = payments[i];
    if (p.status === 'paid' && p.date && p.date.indexOf('2025-01') === 0) {
      collected += p.amt;
    }
  }

  var expected = 0;
  for (var i=0; i<tenants.length; i++) { expected += tenants[i].rent; }

  var overdue = [];
  for (var i=0; i<tenants.length; i++) {
    if (tenants[i].pstatus === 'overdue') overdue.push(tenants[i]);
  }

  var vacant = 0;
  for (var i=0; i<units.length; i++) {
    if (units[i].status === 'vacant') vacant++;
  }

  var occupancy = units.length ? Math.round(((units.length - vacant) / units.length) * 100) : 0;
  var rate = expected ? Math.round((collected / expected) * 100) : 0;

  return e(React.Fragment, null,
    e('div', {style:{background:'linear-gradient(135deg,'+P+','+PD+')',padding:'20px 20px 28px',flexShrink:0}},
      e('div', {style:{display:'flex',alignItems:'center',gap:10,marginBottom:20}},
        e('div', {style:{width:38,height:38,borderRadius:10,background:'rgba(255,255,255,0.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}, '🏠'),
        e('div', null,
          e('div', {style:{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,color:'#fff'}}, 'RentTrack Pro'),
          e('div', {style:{fontSize:11,color:'rgba(255,255,255,0.7)'}}, LANDLORD.biz)
        )
      ),
      e('div', {style:{background:'rgba(255,255,255,0.12)',borderRadius:14,padding:'14px 16px',border:'1px solid rgba(255,255,255,0.2)'}},
        e('div', {style:{fontSize:11,color:'rgba(255,255,255,0.7)',marginBottom:4,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.08em'}}, 'January 2025 - Collected'),
        e('div', {style:{fontFamily:"'Playfair Display',serif",fontSize:34,fontWeight:700,color:'#fff'}}, kes(collected)),
        e('div', {style:{fontSize:12,color:'rgba(255,255,255,0.7)',marginTop:4}}, 'of ' + kes(expected) + ' expected  |  ' + rate + '% collection rate')
      )
    ),
    e('div', {style:{flex:1,overflowY:'auto',padding:16}},
      e('div', {style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}},
        e(Card, {style:{padding:14}},
          e('div', {style:{fontSize:9,color:MUT,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:4,fontWeight:600}}, 'Properties'),
          e('div', {style:{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:700,color:TXT}}, properties.length),
          e('div', {style:{fontSize:11,color:MUT,marginTop:2}}, units.length + ' total units')
        ),
        e(Card, {style:{padding:14}},
          e('div', {style:{fontSize:9,color:MUT,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:4,fontWeight:600}}, 'Occupancy'),
          e('div', {style:{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:700,color:P}}, occupancy + '%'),
          e('div', {style:{fontSize:11,color:MUT,marginTop:2}}, vacant + ' vacant units')
        ),
        e(Card, {style:{padding:14}},
          e('div', {style:{fontSize:9,color:MUT,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:4,fontWeight:600}}, 'Tenants'),
          e('div', {style:{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:700,color:TXT}}, tenants.length),
          e('div', {style:{fontSize:11,color:MUT,marginTop:2}}, 'Active leases')
        ),
        e(Card, {style:{padding:14}},
          e('div', {style:{fontSize:9,color:MUT,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:4,fontWeight:600}}, 'Overdue'),
          e('div', {style:{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:700,color:overdue.length?DNG:P}}, overdue.length),
          e('div', {style:{fontSize:11,color:MUT,marginTop:2}}, overdue.length ? 'Need attention' : 'All clear')
        )
      ),
      overdue.length > 0 && e('div', {style:{marginBottom:16}},
        e(SecTitle, null, 'Overdue Rent'),
        overdue.map(function(t) {
          return e(Card, {key:t.id,style:{padding:'12px 14px',marginBottom:8,border:'1px solid rgba(220,53,69,0.2)',cursor:'pointer'},onClick:function(){setTab('tenants');}},
            e('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
              e('div', {style:{display:'flex',alignItems:'center',gap:10}},
                e(Ava, {name:t.name,size:36}),
                e('div', null,
                  e('div', {style:{fontSize:13,fontWeight:600,color:TXT}}, t.name),
                  e('div', {style:{fontSize:11,color:MUT,marginTop:1}}, t.prop + ' - Unit ' + t.unit)
                )
              ),
              e('div', {style:{textAlign:'right'}},
                e('div', {style:{fontSize:13,fontWeight:700,color:DNG}}, kes(t.rent)),
                e('div', {style:{marginTop:4}}, e(Badge, {status:'overdue'}))
              )
            )
          );
        }),
        e(Btn, {v:'teal',full:true,style:{marginTop:8,padding:'10px'},onClick:function(){props.showT('SMS sent to all overdue tenants');}}, 'Send SMS Reminders to All Overdue Tenants')
      ),
      e('div', {style:{marginBottom:16}},
        e(SecTitle, null, 'Recent Payments'),
        payments.slice(0,4).map(function(p) {
          return e(Card, {key:p.id,style:{padding:'11px 14px',marginBottom:8}},
            e('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
              e('div', null,
                e('div', {style:{fontSize:13,fontWeight:500,color:TXT}}, p.tname),
                e('div', {style:{fontSize:11,color:MUT,marginTop:1}}, fmtDate(p.date) + ' - ' + p.method)
              ),
              e('div', {style:{textAlign:'right'}},
                e('div', {style:{fontSize:13,fontWeight:700,color:P}}, kes(p.amt)),
                e('div', {style:{marginTop:3}}, e(Badge, {status:p.status}))
              )
            )
          );
        })
      )
    )
  );
}

// ---- PROPERTIES ----
function Properties(props) {
  var units = props.units;
  var tenants = props.tenants;
  var showT = props.showT;
  var sel = props.sel;
  var setSel = props.setSel;

  if (sel) {
    var pu = units.filter(function(u){return u.pid===sel.id;});
    var pt = tenants.filter(function(t){
      for(var i=0;i<pu.length;i++){if(pu[i].id===t.uid)return true;}
      return false;
    });
    var total = 0;
    for(var i=0;i<pt.length;i++){total+=pt[i].rent;}
    var occ = pu.filter(function(u){return u.status==='occupied';}).length;
    var vac = pu.filter(function(u){return u.status==='vacant';}).length;

    return e('div', {style:{display:'flex',flexDirection:'column',height:'100%',animation:'slideIn 0.2s ease'}},
      e(Hdr, {title:sel.name,sub:sel.addr,back:true,onBack:function(){setSel(null);}}),
      e('div', {style:{flex:1,overflowY:'auto',padding:16}},
        e('div', {style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}},
          e(Card, {style:{padding:14}},
            e('div', {style:{fontSize:9,color:MUT,textTransform:'uppercase',fontWeight:600,marginBottom:4}}, 'Monthly Rent'),
            e('div', {style:{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:P}}, kes(total))
          ),
          e(Card, {style:{padding:14}},
            e('div', {style:{fontSize:9,color:MUT,textTransform:'uppercase',fontWeight:600,marginBottom:4}}, 'Units'),
            e('div', {style:{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:TXT}}, pu.length)
          ),
          e(Card, {style:{padding:14}},
            e('div', {style:{fontSize:9,color:MUT,textTransform:'uppercase',fontWeight:600,marginBottom:4}}, 'Occupied'),
            e('div', {style:{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:P}}, occ)
          ),
          e(Card, {style:{padding:14}},
            e('div', {style:{fontSize:9,color:MUT,textTransform:'uppercase',fontWeight:600,marginBottom:4}}, 'Vacant'),
            e('div', {style:{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:vac?DNG:P}}, vac)
          )
        ),
        e(SecTitle, null, 'Units'),
        pu.map(function(u) {
          var t = null;
          for(var i=0;i<tenants.length;i++){if(tenants[i].uid===u.id){t=tenants[i];break;}}
          return e(Card, {key:u.id,style:{padding:'12px 14px',marginBottom:8}},
            e('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
              e('div', null,
                e('div', {style:{fontSize:13,fontWeight:600,color:TXT}}, 'Unit ' + u.num + ' - Floor ' + u.floor),
                t && e('div', {style:{fontSize:11,color:MUT,marginTop:2}}, t.name)
              ),
              e('div', {style:{textAlign:'right'}},
                e('div', {style:{fontSize:12,fontWeight:600,color:P}}, kes(u.rent) + '/mo'),
                e('div', {style:{marginTop:4}}, e(Badge, {status:u.status}))
              )
            )
          );
        })
      )
    );
  }

  return e(React.Fragment, null,
    e(Hdr, {title:'Properties',sub:props.properties.length+' properties - '+units.length+' units',action:'+ Add',onAction:function(){showT('Connect database to add properties');}}),
    e('div', {style:{flex:1,overflowY:'auto',padding:16}},
      props.properties.map(function(prop) {
        var pu = units.filter(function(u){return u.pid===prop.id;});
        var pt = tenants.filter(function(t){
          for(var i=0;i<pu.length;i++){if(pu[i].id===t.uid)return true;}
          return false;
        });
        var monthly = 0;
        for(var i=0;i<pt.length;i++){monthly+=pt[i].rent;}
        var vac = pu.filter(function(u){return u.status==='vacant';}).length;

        return e(Card, {key:prop.id,style:{marginBottom:14,overflow:'hidden',cursor:'pointer'},onClick:function(){setSel(prop);}},
          e('div', {style:{background:'linear-gradient(135deg,rgba(13,122,95,0.08),rgba(13,122,95,0.03))',padding:'14px 16px',borderBottom:'1px solid '+BRD}},
            e('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
              e('div', null,
                e('div', {style:{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:TXT}}, prop.name),
                e('div', {style:{fontSize:12,color:MUT,marginTop:2}}, prop.addr),
                e('div', {style:{fontSize:10,color:P,marginTop:4,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em'}}, prop.type)

  }

  return e('div', {style:{height:'100vh',display:'flex',flexDirection:'column',background:BG}},
    toast && e(Toast, {msg:toast,onHide:function(){setToast('');}}),
    e('div', {style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}, content),
    e('div', {style:{display:'flex',borderTop:'1px solid '+BRD,background:'#fff',flexShrink:0,boxShadow:'0 -2px 10px rgba(0,0,0,0.05)'}},
      NAV.map(function(n) {
        var active = tab === n.id;
        return e('button', {key:n.id,onClick:function(){setTab(n.id);if(n.id!=='properties')setPropSel(null);if(n.id!=='tenants')setTenSel(null);},style:{flex:1,padding:'9px 2px',display:'flex',flexDirection:'column',alignItems:'center',gap:3,border:'none',background:'transparent',cursor:'pointer',fontFamily:'inherit'}},
          e('span', {style:{fontSize:16,lineHeight:1}}, n.icon || '='),
          e('span', {style:{fontSize:8,fontWeight:600,color:active?P:MUT,textTransform:'uppercase',letterSpacing:'0.04em'}}, n.label)
        );
      })
    )
  );
}

setTimeout(function() {
  ReactDOM.createRoot(document.getElementById('root')).render(e(App, null));
}, 100);
</script>
