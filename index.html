  const [payments,setPayments]=useState(PAYMENTS);
  const [showLogout,setShowLogout]=useState(false);
  const showT=msg=>setToast(msg);

  const NAV=[
    {id:'dashboard',icon:'⊞',label:'Home'},
    {id:'properties',icon:'🏢',label:'Properties'},
    {id:'tenants',icon:'👥',label:'Tenants'},
    {id:'payments',icon:'💳',label:'Payments'},
    {id:'reports',icon:'📊',label:'Reports'},
    {id:'more',icon:'≡',label:'More'},
  ];

  return React.createElement('div',{style:{height:'100vh',display:'flex',flexDirection:'column',background:C.bg}},
    toast&&React.createElement(Toast,{msg:toast,onHide:()=>setToast('')}),
    React.createElement('div',{style:{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}},
      tab==='dashboard'&&React.createElement(Dashboard,{properties:PROPERTIES,units:UNITS,tenants:TENANTS,payments,setTab,showT}),
      tab==='properties'&&React.createElement(PropertiesView,{properties:PROPERTIES,units:UNITS,tenants:TENANTS,showT}),
      tab==='tenants'&&React.createElement(TenantsView,{tenants:TENANTS,payments,showT}),
      tab==='payments'&&React.createElement(PaymentsView,{tenants:TENANTS,payments,setPayments,showT}),
      tab==='reports'&&React.createElement(ReportsView,{tenants:TENANTS,payments,units:UNITS,showT}),
      tab==='more'&&React.createElement(MoreView,{tenants:TENANTS,showT,onLogout:()=>showT('Demo mode — no logout needed')})),
    React.createElement('div',{style:{display:'flex',borderTop:`1px solid ${C.border}`,background:'#fff',flexShrink:0,paddingBottom:'env(safe-area-inset-bottom,0px)',boxShadow:'0 -2px 10px rgba(0,0,0,0.06)'}},
      NAV.map(n=>React.createElement('button',{key:n.id,onClick:()=>setTab(n.id),style:{flex:1,padding:'8px 2px',display:'flex',flexDirection:'column',alignItems:'center',gap:3,border:'none',background:'transparent',cursor:'pointer',fontFamily:'inherit'}},
        React.createElement('span',{style:{fontSize:16,lineHeight:1}},n.icon),
        React.createElement('span',{style:{fontSize:8,fontWeight:600,color:tab===n.id?C.primary:C.textMuted,textTransform:'uppercase',letterSpacing:'0.04em'}},n.label)))));
}
